services:
  - type: web
    name: sistema-preventa-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn sistemaPreventa.wsgi:application"
    preDeployCommand: "python manage.py migrate"
    postDeployCommand: "python manage.py create_default_admin"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1,.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_EMAIL
        value: "admin@example.com"
      - key: ADMIN_PASSWORD
        value: "admin"
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-preventa-db
          property: connectionString

databases:
  - name: sistema-preventa-db
    plan: free
    databaseName: sistema_preventa
    user: postgres
