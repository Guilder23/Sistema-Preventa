services:
  - type: web
    name: sistema-preventa-web
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn sistemaPreventa.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "localhost,127.0.0.1"
      - key: DATABASE_URL
        fromDatabase:
          name: sistema-preventa-db
          property: connectionString

databases:
  - name: sistema-preventa-db
    plan: free
    databaseName: sistema_preventa
    user: postgres
