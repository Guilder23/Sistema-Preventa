<!-- MODAL: EDITAR USUARIO -->
<div class="modal fade" id="modalEditarUsuario" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title">
                    <i class="fas fa-user-edit"></i> Editar Usuario
                </h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form id="formEditarUsuario" method="post">
                {% csrf_token %}
                <input type="hidden" id="editarUsuarioId" name="usuario_id">
                <div class="modal-body">
                    <div class="row">
                        <!-- COLUMNA IZQUIERDA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-user"></i> Información Personal
                            </h6>

                            <div class="form-group">
                                <label for="editUsername" class="form-label">Usuario</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editUsername" 
                                    name="username" 
                                    disabled
                                >
                                <small class="form-text text-muted">El usuario no puede ser modificado</small>
                            </div>

                            <div class="form-group">
                                <label for="editEmail" class="form-label">Correo Electrónico <span class="text-danger">*</span></label>
                                <input 
                                    type="email" 
                                    class="form-control" 
                                    id="editEmail" 
                                    name="email" 
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="editFirstName" class="form-label">Nombre</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editFirstName" 
                                    name="first_name"
                                >
                            </div>

                            <div class="form-group">
                                <label for="editLastName" class="form-label">Apellido</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="editLastName" 
                                    name="last_name"
                                >
                            </div>
                        </div>

                        <!-- COLUMNA DERECHA -->
                        <div class="col-md-6">
                            <h6 class="text-muted mb-3">
                                <i class="fas fa-cog"></i> Configuración
                            </h6>

                            <div class="form-group">
                                <label for="editPassword" class="form-label">Nueva Contraseña</label>
                                <input 
                                    type="password" 
                                    class="form-control" 
                                    id="editPassword" 
                                    name="password"
                                    placeholder="Dejar en blanco para no cambiar"
                                >
                                <small class="form-text text-muted">Solo si desea cambiar la contraseña</small>
                            </div>

                            <div class="form-group">
                                <label for="editRol" class="form-label">Rol del Usuario</label>
                                <select class="form-control" id="editRol" name="rol">
                                    <option value="administrador">Administrador</option>
                                    <option value="supervisor">Supervisor</option>
                                    <option value="repartidor">Repartidor</option>
                                    <option value="preventista">Preventista</option>
                                </select>
                            </div>

                            <div class="form-group" id="editGrupoSupervisor" style="display: none;">
                                <label for="editSupervisorId" class="form-label">Supervisor</label>
                                <select class="form-control" id="editSupervisorId" name="supervisor_id">
                                    <option value="">-- Sin supervisor --</option>
                                    {% for s in supervisores %}
                                        <option value="{{ s.id }}">{{ s.get_full_name|default:s.username }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <div class="form-group" id="editGrupoRepartidor" style="display: none;">
                                <label for="editRepartidorId" class="form-label">Repartidor</label>
                                <select class="form-control" id="editRepartidorId" name="repartidor_id">
                                    <option value="">-- Sin repartidor --</option>
                                    {% for r in repartidores %}
                                        <option value="{{ r.id }}">{{ r.get_full_name|default:r.username }}</option>
                                    {% endfor %}
                                </select>
                                <small class="form-text text-muted">Asigna un Repartidor para el seguimiento de pedidos del preventista.</small>
                            </div>

                            <div class="form-group">
                                <div class="custom-control custom-checkbox">
                                    <input type="checkbox" class="custom-control-input" id="editIsActive" name="is_active">
                                    <label class="custom-control-label" for="editIsActive">
                                        <strong>Usuario Activo</strong>
                                    </label>
                                </div>
                                <small class="form-text text-muted">Desmarcar para bloquear el usuario</small>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                    <button type="submit" class="btn btn-warning">
                        <i class="fas fa-save"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
