<div class="modal fade" id="modalCrearPedido" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus"></i> Crear Pedido</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <form id="formCrearPedido" method="post" action="{% url 'crear_pedido' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Cliente <span class="text-danger">*</span></label>
                                <select class="form-control" name="cliente_id" id="pedidoCliente" required>
                                    <option value="">-- Selecciona --</option>
                                    {% for c in clientes %}
                                        <option value="{{ c.id }}">{{ c.nombres }}{% if c.apellidos %} {{ c.apellidos }}{% endif %}{% if c.ci_nit %} - {{ c.ci_nit }}{% endif %}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Observación</label>
                                <input type="text" class="form-control" name="observacion" placeholder="Opcional">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0">Detalle</h6>
                        <button type="button" class="btn btn-outline-primary btn-sm" id="btnAgregarItem">
                            <i class="fas fa-plus"></i> Agregar producto
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm" id="tablaItemsPedido">
                            <thead>
                                <tr>
                                    <th style="width: 46%;">Producto</th>
                                    <th style="width: 14%;">Precio</th>
                                    <th style="width: 14%;">Cantidad</th>
                                    <th style="width: 14%;">Subtotal</th>
                                    <th style="width: 12%;" class="text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="itemsPedidoBody">
                            </tbody>
                        </table>
                    </div>

                    <div class="text-right">
                        <h5 class="mb-0">Total: <span id="pedidoTotal">0.00</span></h5>
                    </div>

                    <template id="tplItemPedido">
                        <tr>
                            <td>
                                <select class="form-control form-control-sm item-producto" name="producto_id[]" required>
                                    <option value="">-- Producto --</option>
                                    {% for p in productos %}
                                        <option value="{{ p.id }}" data-precio="{{ p.precio_unidad|default_if_none:'0.00' }}">
                                            {{ p.codigo }} - {{ p.nombre }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </td>
                            <td>
                                <input type="text" class="form-control form-control-sm item-precio" value="0.00" readonly>
                            </td>
                            <td>
                                <input type="number" min="1" class="form-control form-control-sm item-cantidad" name="cantidad[]" value="1" required>
                            </td>
                            <td>
                                <input type="text" class="form-control form-control-sm item-subtotal" value="0.00" readonly>
                            </td>
                            <td class="text-center">
                                <button type="button" class="btn btn-outline-danger btn-sm btn-quitar-item" title="Quitar">
                                    <i class="fas fa-times"></i>
                                </button>
                            </td>
                        </tr>
                    </template>

                    <small class="text-muted">El pedido guarda el precio unitario vigente del producto.</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Pedido</button>
                </div>
            </form>
        </div>
    </div>
</div>
