<div class="modal fade" id="modalCrearPedido" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus"></i> Crear Pedido</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <form id="formCrearPedido" method="post" action="{% url 'crear_pedido' %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="alert alert-danger d-none" id="pedidoCrearError" role="alert"></div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Cliente <span class="text-danger">*</span></label>
                                <input type="hidden" name="cliente_id" id="pedidoClienteId" required>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="pedidoClienteBuscar"
                                    placeholder="Busca cliente por nombre o CI/NIT..."
                                    list="dlClientesPedidos"
                                    autocomplete="off"
                                    required
                                >
                                <datalist id="dlClientesPedidos"></datalist>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Observación</label>
                                <input type="text" class="form-control" name="observacion" placeholder="Opcional">
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0">Detalle</h6>
                        <button type="button" class="btn btn-outline-primary btn-sm" id="btnAgregarItem">
                            <i class="fas fa-cart-plus"></i> Agregar producto al carrito
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm" id="tablaItemsPedido">
                            <thead>
                                <tr>
                                    <th style="width: 36%;">Producto</th>
                                    <th style="width: 12%;" class="col-stock">Stock</th>
                                    <th style="width: 14%;" class="col-precio">Precio (Bs)</th>
                                    <th style="width: 14%;">Cantidad</th>
                                    <th style="width: 14%;">Subtotal (Bs)</th>
                                    <th style="width: 10%;" class="text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="itemsPedidoBody">
                            </tbody>
                        </table>
                    </div>

                    <div class="text-right">
                        <h5 class="mb-0">Total: Bs <span id="pedidoTotal">0.00</span></h5>
                    </div>

                    <template id="tplItemPedido">
                        <tr>
                            <td style="padding-right: 2px; padding-left: 2px;">
                                <input type="hidden" class="item-producto-id" name="producto_id[]" required>
                                <input
                                    type="text"
                                    class="form-control form-control-sm item-producto-buscar"
                                    placeholder="Buscar producto por nombre..."
                                    list="dlProductosPedidos"
                                    autocomplete="off"
                                    required
                                    style="font-size:1.1em; padding:4px 6px;"
                                >
                            </td>
                            <td class="col-stock" style="padding-right: 2px; padding-left: 2px;">
                                <input type="text" class="form-control form-control-sm item-stock" value="0" readonly style="padding:4px 6px;">
                            </td>
                            <td class="col-precio" style="padding-right: 2px; padding-left: 2px;">
                                <input type="text" class="form-control form-control-sm item-precio" value="0.00" readonly style="padding:4px 6px;">
                            </td>
                            <td style="padding-right: 2px; padding-left: 2px;">
                                <div class="item-cantidad-wrap justify-content-center" style="gap:8px;">
                                    <input type="number" min="1" class="form-control form-control-sm item-cantidad" name="cantidad[]" value="1" required style="max-width:50px; text-align:center; padding:4px 6px;">
                                </div>
                            </td>
                            <td style="padding-right: 2px; padding-left: 2px;">
                                <input type="text" class="form-control form-control-sm item-subtotal" value="0.00" readonly style="padding:4px 6px;">
                            </td>
                            <td class="text-center" style="padding-right: 2px; padding-left: 2px;">
                                <button type="button" class="btn btn-outline-danger btn-xs btn-quitar-item" title="Quitar" style="padding:2px 6px; font-size:14px;">
                                    <i class="fas fa-times"></i>
                                </button>
                            </td>
                        </tr>
                    </template>

                    <small class="text-muted">El pedido guarda el precio unitario vigente del producto.</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Pedido</button>
                </div>
            </form>
        </div>
    </div>
</div>

{{ clientes_data|json_script:"clientes-data-pedidos" }}
{{ productos_data|json_script:"productos-data-pedidos" }}

<datalist id="dlProductosPedidos"></datalist>
