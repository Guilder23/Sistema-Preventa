<div class="modal fade" id="modalVerPedido" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title"><i class="fas fa-eye"></i> Detalle de Pedido</h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <div class="row mb-2">
                    <div class="col-md-6">
                        <div><strong>Cliente:</strong> <span id="verPedidoCliente">—</span></div>
                        <div><strong>Preventista:</strong> <span id="verPedidoPreventista">—</span></div>
                    </div>
                    <div class="col-md-6">
                        <div><strong>Fecha:</strong> <span id="verPedidoFecha">—</span></div>
                        <div><strong>Estado:</strong> <span id="verPedidoEstado">—</span></div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm mb-2">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th style="width: 18%;">Precio</th>
                                <th style="width: 14%;">Cant.</th>
                                <th style="width: 18%;">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="verPedidoDetalles"></tbody>
                    </table>
                </div>

                <div class="text-right">
                    <h5 class="mb-0">Total: <span id="verPedidoTotal">0.00</span></h5>
                </div>

                <div class="mt-2">
                    <small class="text-muted"><strong>Obs.:</strong> <span id="verPedidoObs">—</span></small>
                </div>
            </div>
            <div class="modal-footer">
                <a class="btn btn-outline-danger" id="verPedidoPdf" href="#" target="_blank" rel="noopener">
                    <i class="fas fa-file-pdf"></i> Imprimir PDF
                </a>
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
