<div class="modal fade" id="modalEditarPedido" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title"><i class="fas fa-edit"></i> Editar Pedido</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <form id="formEditarPedido" method="post">
                {% csrf_token %}
                <input type="hidden" id="editarPedidoId" name="pedido_id">
                <div class="modal-body">
                    <div class="alert alert-danger d-none" id="pedidoEditarError" role="alert"></div>
                    <div class="row">
                        
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Cliente</label>
                                <input type="text" class="form-control" id="editarPedidoCliente" value="" disabled>
                                <small class="form-text text-muted">El cliente no se puede cambiar.</small>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Observación</label>
                                <input type="text" class="form-control" name="observacion" id="editarPedidoObs" placeholder="Opcional">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Fecha de Entrega Estimada <span class="text-danger">*</span></label>
                                <input 
                                    type="date" 
                                    class="form-control" 
                                    name="fecha_entrega_estimada" 
                                    id="editarPedidoFechaEntrega"
                                    required
                                >
                                <small class="text-muted d-block mt-1">No puede ser una fecha menor a hoy</small>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h6 class="mb-0">Detalle</h6>
                        <button type="button" class="btn btn-outline-primary btn-sm" id="btnAgregarItemEditar">
                            <i class="fas fa-cart-plus"></i> Agregar producto al carrito
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-sm" id="tablaItemsPedidoEditar">
                            <thead>
                                <tr>
                                    <th style="width: 36%;">Producto</th>
                                    <th style="width: 12%;" class="col-stock">Stock</th>
                                    <th style="width: 14%;" class="col-precio">Precio (Bs)</th>
                                    <th style="width: 14%;">Cantidad</th>
                                    <th style="width: 14%;">Subtotal (Bs)</th>
                                    <th style="width: 10%;" class="text-center">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="itemsPedidoEditarBody"></tbody>
                        </table>
                    </div>

                    <div class="text-right">
                        <h5 class="mb-0">Total: Bs <span id="pedidoEditarTotal">0.00</span></h5>
                    </div>

                    <template id="tplItemPedidoEditar">
                        <tr>
                            <td>
                                <input type="hidden" class="item-producto-id" name="producto_id[]" required>
                                <input
                                    type="text"
                                    class="form-control form-control-sm item-producto-buscar"
                                    placeholder="Buscar producto..."
                                    list="dlProductosPedidos"
                                    autocomplete="off"
                                    required
                                >
                            </td>
                            <td class="col-stock">
                                <input type="text" class="form-control form-control-sm item-stock" value="0" readonly>
                            </td>
                            <td class="col-precio">
                                <input type="text" class="form-control form-control-sm item-precio" value="0.00" readonly>
                            </td>
                            <td>
                                <div class="item-cantidad-wrap">
                                    <button type="button" class="btn btn-outline-secondary btn-sm btn-cant-menos" title="Restar">
                                        <i class="fas fa-minus"></i>
                                    </button>
                                    <input type="number" min="1" class="form-control form-control-sm item-cantidad" name="cantidad[]" value="1" required>
                                    <button type="button" class="btn btn-outline-secondary btn-sm btn-cant-mas" title="Sumar">
                                        <i class="fas fa-plus"></i>
                                    </button>
                                </div>
                            </td>
                            <td>
                                <input type="text" class="form-control form-control-sm item-subtotal" value="0.00" readonly>
                            </td>
                            <td class="text-center">
                                <button type="button" class="btn btn-outline-danger btn-sm btn-quitar-item" title="Quitar">
                                    <i class="fas fa-times"></i>
                                </button>
                            </td>
                        </tr>
                    </template>

                    <small class="text-muted">El pedido guarda el precio unitario vigente del producto.</small>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cancelar</button>
                    <button type="submit" class="btn btn-warning"><i class="fas fa-save"></i> Guardar Cambios</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
(function() {
    const fechaEntregaEl = document.getElementById('editarPedidoFechaEntrega');
    if (fechaEntregaEl) {
        const hoy = new Date();
        const año = hoy.getFullYear();
        const mes = String(hoy.getMonth() + 1).padStart(2, '0');
        const día = String(hoy.getDate()).padStart(2, '0');
        fechaEntregaEl.min = `${año}-${mes}-${día}`;
    }
})();
</script>
