<div class="modal fade" id="modalVerProducto" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title"><i class="fas fa-eye"></i> Detalle de Producto</h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-4">
                        <div class="producto-ver-img">
                            <img id="verProductoFoto" class="producto-ver-img__img d-none" alt="Imagen del producto">
                            <div id="verProductoFotoEmpty" class="producto-ver-img__empty">
                                <i class="fas fa-image"></i>
                                <div>Sin imagen</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="row mb-2">
                            <div class="col-md-6">
                                <div><strong>Código:</strong> <span id="verProductoCodigo">—</span></div>
                                <div><strong>Nombre:</strong> <span id="verProductoNombre">—</span></div>
                            </div>
                            <div class="col-md-6">
                                <div><strong>Estado:</strong> <span id="verProductoEstado">—</span></div>
                                <div><strong>Stock:</strong> <span id="verProductoStock">—</span></div>
                            </div>
                        </div>

                        <div class="row mb-2">
                            <div class="col-md-4"><strong>P. Unidad:</strong> Bs <span id="verProductoPrecioUnidad">0.00</span></div>
                            <div class="col-md-4"><strong>P. Mayor:</strong> Bs <span id="verProductoPrecioMayor">0.00</span></div>
                            <div class="col-md-4"><strong>P. Caja:</strong> Bs <span id="verProductoPrecioCaja">0.00</span></div>
                        </div>

                        <div class="mt-2">
                            <strong>Descripción:</strong>
                            <div class="text-muted" id="verProductoDescripcion">—</div>
                        </div>

                        <div class="mt-3">
                            <small class="text-muted">
                                <strong>Umbrales stock:</strong>
                                Amarillo ≤ <span id="verProductoUmbralAmarillo">10</span> | Rojo ≤ <span id="verProductoUmbralRojo">3</span>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
