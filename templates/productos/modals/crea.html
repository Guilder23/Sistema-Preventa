{% if user.is_superuser or user.perfil.rol == 'administrador' %}
<div class="modal fade" id="modalCrearProducto" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus"></i> Crear Producto</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <form method="post" action="{% url 'crear_producto' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Código <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="codigo" required>
                            </div>
                            <div class="form-group">
                                <label>Nombre <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="nombre" required>
                            </div>
                            <div class="form-group">
                                <label>Descripción</label>
                                <textarea class="form-control" name="descripcion" rows="3"></textarea>
                            </div>
                            <div class="form-group">
                                <label>Foto</label>
                                <input type="file" class="form-control" name="foto" accept="image/*">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Precio unidad</label>
                                <input type="number" step="0.01" class="form-control" name="precio_unidad" value="0">
                            </div>
                            <div class="form-group">
                                <label>Precio mayor</label>
                                <input type="number" step="0.01" class="form-control" name="precio_mayor" value="0">
                            </div>
                            <div class="form-group">
                                <label>Precio caja</label>
                                <input type="number" step="0.01" class="form-control" name="precio_caja" value="0">
                            </div>
                            <small class="text-muted">Los precios se usan en pedidos.</small>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endif %}
