{% extends 'base/base.html' %}
{% load static %}

{% block titulo %}Mapa de Clientes{% endblock %}

{% block estilos_extra %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="{% static 'css/clientes/mapa.css' %}">
{% endblock %}

{% block contenido %}
<div class="container-fluid">
    <div class="page-header">
        <div class="page-header-content">
            <h1 class="page-title"><i class="fas fa-map-location-dot"></i> Mapa de Clientes</h1>
            <p class="page-subtitle">Clientes con ubicación registrada</p>
        </div>
    </div>

    <div class="card card-tabla">
        <div class="card-body">
            <div class="mapa-clientes-topbar mb-2" role="search">
                <div class="topbar-row">
                    <div class="topbar-search" id="clientesSearchWrap">
                        <i class="fas fa-search topbar-search-icon" aria-hidden="true"></i>
                        <input
                            type="search"
                            id="buscarClienteMapa"
                            class="topbar-search-input"
                            placeholder="Buscar cliente, CI/NIT o teléfono"
                            autocomplete="off"
                            value="{{ q|default:'' }}"
                        >
                    </div>
                    <button type="button" class="topbar-btn" id="btnClientesFiltro" aria-label="Filtros">
                        <i class="fas fa-filter"></i>
                    </button>
                </div>
                <div class="topbar-filters" id="clientesFiltros" hidden>
                    <select id="estadoClienteMapa" class="topbar-select" aria-label="Filtrar por estado">
                        <option value="" {% if not estado %}selected{% endif %}>Todos los estados</option>
                        <option value="activo" {% if estado == 'activo' %}selected{% endif %}>Activos</option>
                        <option value="inactivo" {% if estado == 'inactivo' %}selected{% endif %}>Inactivos</option>
                    </select>
                    <select id="vendedorClienteMapa" class="topbar-select" aria-label="Filtrar por preventista">
                        <option value="" {% if not vendedor %}selected{% endif %}>Todos los preventistas</option>
                        {% for u in vendedores %}
                            <option value="{{ u.id }}" {% if vendedor == u.id|stringformat:'s' %}selected{% endif %}>{{ u.get_full_name|default:u.username }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mapa-clientes-shell" aria-label="Mapa de clientes">
                <div id="mapaClientes" class="mapa-clientes" data-url="{% url 'clientes_mapa_puntos' %}"></div>
                <small class="text-muted d-block mt-2" id="mapaClientesInfo"></small>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts_extra %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="{% static 'js/clientes/mapa.js' %}"></script>
{% endblock %}
