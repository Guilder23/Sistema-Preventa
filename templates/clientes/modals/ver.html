<div class="modal fade" id="modalVerCliente" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header bg-info text-white">
                <h5 class="modal-title"><i class="fas fa-eye"></i> Detalle de Cliente</h5>
                <button type="button" class="close text-white" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-4">
                        <div class="cliente-foto-box">
                            <img id="verClienteFoto" class="cliente-foto-preview d-none" alt="Imagen de la tienda">
                            <div id="verClienteFotoEmpty" class="cliente-foto-empty">
                                <i class="fas fa-store"></i>
                                <div>Sin imagen</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-8">
                        <div class="row mb-2">
                            <div class="col-md-6">
                                <div><strong>Nombres:</strong> <span id="verClienteNombres">—</span></div>
                                <div><strong>Apellidos:</strong> <span id="verClienteApellidos">—</span></div>
                                <div><strong>CI/NIT:</strong> <span id="verClienteCiNit">—</span></div>
                            </div>
                            <div class="col-md-6">
                                <div><strong>Teléfono:</strong> <span id="verClienteTelefono">—</span></div>
                                <div><strong>Estado:</strong> <span id="verClienteEstado">—</span></div>
                            </div>
                        </div>
                        <div class="mb-2">
                            <strong>Dirección:</strong>
                            <div class="text-muted" id="verClienteDireccion">—</div>
                        </div>
                        <div class="mb-2">
                            <strong>Descripción:</strong>
                            <div class="text-muted" id="verClienteDescripcion">—</div>
                        </div>
                        <div>
                            <strong>Ubicación:</strong>
                            <div class="text-muted" id="verClienteUbicacion">—</div>
                        </div>
                        <div class="mt-3 p-2 bg-light rounded border border-info">
                            <div class="small">
                                <strong>Registrado por:</strong> <span id="verClienteRegistrador">—</span> 
                                <span class="badge badge-info ml-1" id="verClienteRolRegistrador">—</span>
                            </div>
                            <div class="small text-muted">
                                <i class="fas fa-calendar-alt"></i> Fecha: <span id="verClienteFechaRegistro">—</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
