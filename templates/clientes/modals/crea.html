<div class="modal fade" id="modalCrearCliente" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-lg modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-user-plus"></i> Crear Cliente</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <form id="formCrearCliente" method="post" action="{% url 'crear_cliente' %}" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Nombres <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="nombres" placeholder="Ej: Juan Carlos" required>
                            </div>
                            <div class="form-group">
                                <label>Apellidos</label>
                                <input type="text" class="form-control" name="apellidos" placeholder="Ej: Pérez Gómez">
                            </div>
                            <div class="form-group">
                                <label>CI/NIT</label>
                                <input type="text" class="form-control" name="ci_nit" placeholder="Ej: 1234567 LP">
                            </div>
                            <div class="form-group">
                                <label>Teléfono</label>
                                <input type="text" class="form-control" name="telefono" placeholder="Ej: 70012345">
                            </div>

                            <div class="form-group">
                                <label>Imagen de la tienda</label>
                                <input type="file" class="d-none" id="crearFotoTienda" name="foto_tienda" accept="image/*">
                                <div class="cliente-foto-actions d-flex flex-wrap align-items-start" style="gap:8px;">
                                    <button type="button" class="btn btn-outline-secondary btn-sm" id="btnCrearFotoSeleccionar" title="Seleccionar una imagen desde el dispositivo">
                                        <i class="fas fa-image"></i> Seleccionar foto
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary btn-sm" id="btnCrearFotoCamara" title="Pedir permiso y usar la cámara">
                                        <i class="fas fa-camera"></i> Tomar foto
                                    </button>
                                </div>
                                <small class="text-muted d-block mt-1" id="crearFotoTiendaNombre">Ningún archivo seleccionado</small>
                                <div id="crearCamaraWrap" class="cliente-camara-wrap d-none mt-2">
                                    <video id="crearCamaraVideo" class="cliente-camara-video" playsinline muted autoplay></video>
                                    <div class="d-flex flex-wrap mt-2" style="gap:8px;">
                                        <button type="button" class="btn btn-primary btn-sm" id="btnCrearCamaraCapturar">
                                            <i class="fas fa-camera-retro"></i> Capturar
                                        </button>
                                        <button type="button" class="btn btn-outline-secondary btn-sm" id="btnCrearCamaraCerrar">Cerrar cámara</button>
                                    </div>
                                </div>
                                <div class="mt-2">
                                    <img id="crearFotoTiendaPreview" class="cliente-foto-preview d-none" alt="Previsualización de tienda">
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>Dirección</label>
                                <textarea class="form-control" name="direccion" rows="3" placeholder="Ej: Av. Alemana, zona norte"></textarea>
                            </div>
                            
                            <div class="form-group">
                                <label>Descripción</label>
                                <textarea class="form-control" name="descripcion" rows="2" placeholder="Ej: referencias, horario, notas..."></textarea>
                            </div>

                            <div class="form-group">
                                <label>Geolocalización</label>
                                <div class="d-flex" style="gap:8px;">
                                    <button type="button" class="btn btn-outline-primary btn-sm" id="btnUbicacionCrear">
                                        <i class="fas fa-location-crosshairs"></i> Obtener ubicación
                                    </button>
                                    <small class="text-muted align-self-center" id="ubicacionCrearEstado">Sin ubicación</small>
                                </div>
                            </div>

                            <div class="form-group">
                                <label>Latitud</label>
                                <input type="text" class="form-control" name="latitud" id="crearLatitud" placeholder="Ej: -17.78325">
                            </div>
                            <div class="form-group">
                                <label>Longitud</label>
                                <input type="text" class="form-control" name="longitud" id="crearLongitud" placeholder="Ej: -63.18210">
                            </div>

                            <small class="text-muted">Puedes capturar o ingresar la ubicación manualmente.</small>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal"><i class="fas fa-times"></i> Cancelar</button>
                    <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar</button>
                </div>
            </form>
        </div>
    </div>
</div>
